<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rex Hill Wine Concierge — Mockup v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #ececec;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    .chat-container {
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 15vh;
      gap: 28px;
    }

    .brand {
      color: #888;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .heading {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 500;
      color: #ececec;
      text-align: center;
      line-height: 1.15;
      white-space: nowrap;
    }

    .input-wrapper {
      width: 100%;
      max-width: 680px;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 20px;
      padding: 14px 18px;
      margin-top: 8px;
    }

    .input-top {
      display: flex;
      align-items: flex-end;
    }
    .input-top textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #ececec;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      resize: none;
      line-height: 1.5;
      min-height: 24px;
    }
    .input-top textarea::placeholder { color: #666; }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: #111;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    .quick-btn {
      padding: 9px 16px;
      border-radius: 12px;
      border: 1px solid #2e2e2e;
      background: #1a1a1a;
      color: #a09496;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .quick-btn:hover {
      background: #2e2e2e;
      border-color: #3a3a3a;
      color: #ececec;
    }

    .footer {
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    .footer span { color: #888; }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="brand">REX HILL Wine Concierge</div>
    <h1 class="heading">What can I help you discover today?</h1>

    <div class="input-wrapper">
      <div class="input-top">
        <textarea rows="1" placeholder="Ask about wines, tastings, hours..."></textarea>
        <button class="send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>

    <div class="quick-actions">
      <button class="quick-btn">Tasting options</button>
      <button class="quick-btn">Hours & directions</button>
      <button class="quick-btn">Wine club info</button>
      <button class="quick-btn">Food pairings</button>
    </div>

    <div class="footer">Powered by <span>OregonWine.ai</span></div>
  </div>

</body>
</html>
