# Local Supabase — https://supabase.com/docs/guides/cli/config
project_id = "oregonwine-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

# Per-function config (CLI expects verify_jwt under [functions.NAME], not a global bool).
[functions.chat]
verify_jwt = false

[functions.feedback]
verify_jwt = false
