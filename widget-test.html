<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OregonWine.ai — Wine Agent (demo)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        min-height: 100%;
        min-height: 100dvh;
      }

      body {
        font-family: 'DM Sans', system-ui, sans-serif;
        background: #0d0d0d;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Slightly more bottom padding shifts the flex center upward (optical center). */
        padding: clamp(16px, 5vh, 40px) 24px clamp(28px, 14vh, 140px);
        color: #ececec;
      }

      #widget-root {
        width: 100%;
        max-width: 820px;
        height: min(680px, calc(100dvh - 48px));
      }
    </style>
  </head>
  <body>
    <div id="widget-root"></div>
    <script type="module" src="/src/widget-test-entry.tsx"></script>
  </body>
</html>
