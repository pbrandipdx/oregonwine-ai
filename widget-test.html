<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Crushpad.ai — Wine Agent (demo)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Redirecting to the in-app chatbot demo — use the site navigation to explore other pages."
    />
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #080808;
        color: #a8a39e;
        font-family: system-ui, sans-serif;
        padding: 1.5rem;
        text-align: center;
      }
      a {
        color: #c47a84;
      }
    </style>
    <script>
      (function () {
        var p = location.pathname;
        var i = p.lastIndexOf("widget-test.html");
        if (i < 0) return;
        var prefix = p.slice(0, i).replace(/\/$/, "");
        location.replace(prefix + "/widget-demo" + location.search + location.hash);
      })();
    </script>
  </head>
  <body>
    <p>
      Opening the chatbot demo in the main app…
      <a id="cont" href="#">Continue</a>
    </p>
    <script>
      (function () {
        var p = location.pathname;
        var i = p.lastIndexOf("widget-test.html");
        var prefix = i >= 0 ? p.slice(0, i).replace(/\/$/, "") : "";
        var target = prefix + "/widget-demo" + location.search + location.hash;
        var a = document.getElementById("cont");
        if (a) a.setAttribute("href", target);
      })();
    </script>
  </body>
</html>
