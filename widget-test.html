<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>REX HILL — Wine Concierge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', system-ui, sans-serif;
        background: #f7f5f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #3b3228;
      }

      .page-header {
        text-align: center;
        margin-bottom: 24px;
      }

      .page-header h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 500;
        font-size: 28px;
        color: #3b3228;
        letter-spacing: 0.02em;
      }

      .page-header p {
        color: #7a6e5d;
        font-size: 14px;
        margin-top: 6px;
      }

      #widget-root {
        width: 100%;
        max-width: 460px;
      }

      .page-footer {
        margin-top: 20px;
        text-align: center;
        font-size: 12px;
        color: #a89e8f;
      }

      .page-footer a {
        color: #7a6e5d;
        text-decoration: none;
      }
      .page-footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="page-header">
      <h1>Rex Hill Wine Concierge</h1>
      <p>Ask about tastings, wines, hours, or anything about the winery</p>
    </div>
    <div id="widget-root"></div>
    <div class="page-footer">
      Powered by <a href="https://pbrandipdx.github.io/oregonwine-ai/">OregonWine.ai</a>
    </div>
    <script type="module" src="/src/widget-test-entry.tsx"></script>
  </body>
</html>
